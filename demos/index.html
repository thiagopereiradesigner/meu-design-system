<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TP.IA - Design System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ds-demo-base.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body.index-portal {
      font-family: var(--ds-font-family);
      background: var(--ds-bg);
      color: var(--ds-fg);
    }

    /* Barra superior — tokens DS (referência portal) */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--ds-bg);
      border-bottom: 1px solid var(--ds-border);
      box-shadow: var(--ds-shadow-sm);
    }

    .top-bar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .top-bar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .top-bar-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(145deg, var(--ds-success) 0%, var(--ds-success-hover) 100%);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ds-bg);
      font-size: 14px;
      font-weight: 800;
    }

    .top-bar-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--ds-n800);
      letter-spacing: -0.02em;
    }

    .top-bar-slash {
      color: var(--ds-n500);
      font-weight: 500;
    }

    .top-bar-cta {
      font-size: 13px;
      font-weight: 600;
      color: var(--ds-success);
      text-decoration: none;
      white-space: nowrap;
      padding: 8px 14px;
      border-radius: 9999px;
      border: 1px solid var(--ds-success);
      background: var(--ds-bg);
      transition: background 0.15s ease, color 0.15s ease;
    }

    .top-bar-cta:hover {
      background: var(--ds-success-bg);
      color: var(--ds-success-fg);
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 40px 24px 32px;
      max-width: 720px;
      margin: 0 auto;
    }

    .hero-title {
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 800;
      color: var(--ds-success-fg);
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--ds-n500);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .hero-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
      min-width: 100px;
    }

    .hero-stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--ds-success);
      line-height: 1.1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: var(--ds-n500);
      margin-top: 4px;
    }

    .hero-stat-sep {
      width: 1px;
      height: 40px;
      background: var(--ds-border);
      flex-shrink: 0;
    }

    /* Busca e filtros */
    .controls {
      background: var(--ds-bg);
      border-top: 1px solid var(--ds-border);
      padding: 20px 24px 24px;
      margin-bottom: 8px;
    }

    .controls-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 560px;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ds-n500);
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1px solid var(--ds-border);
      border-radius: 10px;
      font-size: 14px;
      font-family: var(--ds-font-family);
      background: var(--ds-bg);
      color: var(--ds-n800);
    }

    .search-wrap input:focus {
      outline: none;
      border-color: var(--ds-success);
      box-shadow: var(--ds-focus-ring);
    }

    .search-wrap input::placeholder {
      color: var(--ds-n500);
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 1px solid var(--ds-border);
      background: var(--ds-bg);
      border-radius: 9999px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--ds-font-family);
      color: var(--ds-n800);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .filter-btn:hover {
      background: var(--ds-bg-subtle);
    }

    .filter-btn.active {
      background: var(--ds-success);
      color: var(--ds-bg);
      border-color: var(--ds-success);
    }

    /* Grelha de componentes */
    #components-grid {
      scroll-margin-top: 72px;
    }

    .components-grid {
      padding: 24px 24px 48px;
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    @media (min-width: 1100px) {
      .components-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .component-card {
      background: var(--ds-bg);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--ds-border);
      box-shadow: none;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .component-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--ds-shadow-md, 0 12px 28px rgba(0,0,0,0.1));
    }

    .component-card--tokens {
      border: 2px solid var(--ds-success);
      box-shadow: none;
    }

    .component-card--tokens:hover {
      box-shadow: var(--ds-shadow-success, 0 12px 32px rgba(4,132,59,0.18));
    }

    .component-preview {
      background: var(--ds-bg-subtle);
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 16px;
      border-bottom: 1px solid var(--ds-border);
    }

    .component-preview::after {
      content: 'Preview';
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: var(--ds-surface-elevated);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--ds-n500);
      border: 1px solid var(--ds-border);
    }

    .component-info {
      padding: 18px 20px 20px;
    }

    .component-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--ds-n800);
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .component-description {
      font-size: 14px;
      color: var(--ds-n500);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .component-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .component-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      background: var(--ds-success-bg);
      color: var(--ds-success-fg);
    }

    /* Mini prévias dos componentes nos cards */
    .preview-inner {
      width: 100%;
      max-width: 260px;
      height: 100%;
      border-radius: 8px;
      border: 1px solid var(--ds-border);
      background: var(--ds-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      overflow: hidden;
    }

    .preview-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .preview-button-primary {
      padding: 8px 14px;
      border-radius: 9999px;
      border: none;
      background: var(--ds-success);
      color: var(--ds-bg);
      font-size: 12px;
      font-weight: 600;
    }

    .preview-button-secondary {
      padding: 8px 14px;
      border-radius: 9999px;
      border: 1px solid var(--ds-success);
      background: var(--ds-bg);
      color: var(--ds-success);
      font-size: 12px;
      font-weight: 600;
    }

    .preview-input {
      flex: 1;
      min-width: 0;
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid var(--ds-border);
      font-size: 12px;
      color: var(--ds-n800);
    }

    .preview-select {
      flex: 1;
      min-width: 0;
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid var(--ds-border);
      font-size: 12px;
      color: var(--ds-n800);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .preview-checkbox,
    .preview-radio {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid var(--ds-border);
      background: var(--ds-bg);
    }

    .preview-radio {
      border-radius: 9999px;
    }

    .preview-switch-track {
      width: 32px;
      height: 16px;
      border-radius: 9999px;
      background: var(--ds-n200);
      position: relative;
    }

    .preview-switch-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 9999px;
      background: var(--ds-bg);
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .preview-textarea {
      width: 100%;
      height: 48px;
      border-radius: 4px;
      border: 1px solid var(--ds-border);
      font-size: 11px;
      padding: 6px 8px;
      color: var(--ds-n800);
      resize: none;
    }

    .preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
    }

    .preview-table th,
    .preview-table td {
      padding: 4px 6px;
      border-bottom: 1px solid var(--ds-separator-light);
      text-align: left;
    }

    .preview-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 9999px;
      background: var(--ds-success-bg);
      color: var(--ds-success-fg);
      font-size: 10px;
      font-weight: 500;
    }

    .preview-toast {
      width: 100%;
      border-radius: 6px;
      background: var(--ds-success);
      color: var(--ds-bg);
      padding: 8px 10px;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .preview-tab-group {
      width: 100%;
      border-bottom: 1px solid var(--ds-border);
      display: flex;
      gap: 0;
    }

    .preview-tab {
      padding: 6px 10px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--ds-n500);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
    }

    .preview-tab-active {
      color: var(--ds-success);
      border-bottom-color: var(--ds-success);
      font-weight: 600;
    }

    .preview-dp-input {
      width: 100%;
      padding: 5px 28px 5px 8px;
      border: 1px solid var(--ds-border);
      border-radius: 6px;
      font-size: 10px;
      color: var(--ds-n500);
      background: var(--ds-bg);
    }

    .preview-dp-cal {
      width: 100%;
      border: 1px solid var(--ds-border);
      border-radius: 6px;
      overflow: hidden;
    }

    .preview-dp-cal-header {
      background: var(--ds-bg);
      padding: 4px 6px;
      font-size: 9px;
      font-weight: 600;
      color: var(--ds-n800);
      text-align: center;
      border-bottom: 1px solid var(--ds-border);
    }

    .preview-dp-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      padding: 4px;
    }

    .preview-dp-cal-day {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      aspect-ratio: 1;
      font-size: 8px;
      border-radius: 3px;
      color: var(--ds-n800);
    }

    .preview-dp-cal-day--selected {
      background: var(--ds-success);
      color: var(--ds-bg);
      font-weight: 600;
    }

    .preview-dp-cal-day--today {
      color: var(--ds-success);
      font-weight: 700;
      border: 1px solid var(--ds-success);
    }

    .preview-dp-cal-day--range {
      background: var(--ds-success-bg);
      color: var(--ds-success-fg);
    }

    .preview-dp-cal-day--muted {
      color: var(--ds-n200);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--ds-n500);
    }

    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--ds-n800);
    }
  </style>
</head>
<body class="index-portal">
  <header class="top-bar">
    <div class="top-bar-inner">
      <div class="top-bar-brand">
        <span class="top-bar-logo" aria-hidden="true">TP</span>
        <div class="top-bar-title">TP.IA <span class="top-bar-slash">/</span> Design System</div>
      </div>
      <a href="design-tokens.html" class="top-bar-cta">Ver tokens →</a>
    </div>
  </header>

  <section class="hero" aria-labelledby="hero-title">
    <h1 id="hero-title" class="hero-title">TP.IA Design System</h1>
    <p class="hero-sub">Biblioteca de componentes reutilizáveis com tokens de design e documentação completa</p>
    <div class="hero-stats" role="group" aria-label="Indicadores do design system">
      <div class="hero-stat">
        <span class="hero-stat-value" id="total-components">0</span>
        <span class="hero-stat-label">Componentes</span>
      </div>
      <div class="hero-stat-sep" aria-hidden="true"></div>
      <div class="hero-stat">
        <span class="hero-stat-value">150+</span>
        <span class="hero-stat-label">Design Tokens</span>
      </div>
      <div class="hero-stat-sep" aria-hidden="true"></div>
      <div class="hero-stat">
        <span class="hero-stat-value">AA</span>
        <span class="hero-stat-label">WCAG</span>
      </div>
    </div>
  </section>

  <div class="controls">
    <div class="controls-inner">
      <div class="search-wrap search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input
          type="search"
          id="search-input"
          placeholder="Buscar componentes..."
          autocomplete="off"
          aria-label="Buscar componentes"
        >
      </div>
      <div class="filter-buttons" role="group" aria-label="Filtrar por categoria">
        <button type="button" class="filter-btn active" data-filter="all">Todos</button>
        <button type="button" class="filter-btn" data-filter="foundation">Fundação</button>
        <button type="button" class="filter-btn" data-filter="form">Formulário</button>
        <button type="button" class="filter-btn" data-filter="data">Dados</button>
        <button type="button" class="filter-btn" data-filter="feedback">Feedback</button>
        <button type="button" class="filter-btn" data-filter="navigation">Navegação</button>
      </div>
    </div>
  </div>

  <!-- Components Grid -->
  <div class="components-grid" id="components-grid">
    <!-- Cards serão gerados via JavaScript -->
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="empty-state" style="display: none;">
    <h3>Nenhum componente encontrado</h3>
    <p>Tente ajustar os filtros ou buscar por outro termo</p>
  </div>

  <script>
    // Base de dados dos componentes
    const components = [
      {
        name: 'Design Tokens',
        description: 'Cores, tipografia, espaçamentos, border-radius e sombras — os valores fundamentais do sistema',
        category: 'foundation',
        file: 'design-tokens.html'
      },
      {
        name: 'Iconografia',
        description: 'Biblioteca de ícones Lucide com busca, categorias e download em SVG',
        category: 'foundation',
        file: 'icons-demo.html'
      },
      {
        name: 'Tooltip',
        description: 'Dica contextual com setinha e posições (top/right/bottom/left)',
        category: 'foundation',
        file: 'tooltip-demo.html'
      },
      {
        name: 'Button',
        description: 'Botões com múltiplas variantes (primary, secondary, ghost) e estados interativos',
        category: 'form',
        file: 'button-demo.html'
      },
      {
        name: 'Input',
        description: 'Campo de entrada de texto com estados, ícones e validação',
        category: 'form',
        file: 'input-demo.html'
      },
      {
        name: 'Select',
        description: 'Dropdown para seleção de opções com busca e estados',
        category: 'form',
        file: 'select-demo.html'
      },
      {
        name: 'Checkbox',
        description: 'Caixas de seleção múltipla com estados e mensagens',
        category: 'form',
        file: 'checkbox-demo.html'
      },
      {
        name: 'Radio',
        description: 'Botões de seleção única para opções exclusivas',
        category: 'form',
        file: 'radio-demo.html'
      },
      {
        name: 'Switch',
        description: 'Toggle para alternar entre estados on/off',
        category: 'form',
        file: 'switch-demo.html'
      },
      {
        name: 'Textarea',
        description: 'Campo de texto multilinhas com redimensionamento',
        category: 'form',
        file: 'textarea-demo.html'
      },
      {
        name: 'Date Picker',
        description: 'Seletor de data com calendário, seleção de intervalo e todos os estados do campo',
        category: 'form',
        file: 'datepicker-demo.html'
      },
      {
        name: 'Table',
        description: 'Tabelas responsivas com sorting, paginação e virtual scrolling',
        category: 'data',
        file: 'table-demo.html'
      },
      {
        name: 'Toast',
        description: 'Notificações temporárias para feedback do sistema',
        category: 'feedback',
        file: 'toast-demo-updated.html'
      },
      {
        name: 'Alert',
        description: 'Alertas inline (ícone + opcional texto) com dismiss',
        category: 'feedback',
        file: 'alert-demo.html'
      },
      {
        name: 'Badge',
        description: 'Indicadores visuais para status e contadores',
        category: 'feedback',
        file: 'badge-demo.html'
      },
      {
        name: 'Spinner',
        description: 'Indicador visual de carregamento (status) com variantes de tamanho',
        category: 'feedback',
        file: 'spinner-demo.html'
      },
      {
        name: 'Skeleton',
        description: 'Placeholders de carregamento (pulse) no padrão shadcn: avatar + linhas',
        category: 'feedback',
        file: 'skeleton-demo.html'
      },
      {
        name: 'Divider',
        description: 'Linha separadora horizontal/vertical para seções e feedback',
        category: 'foundation',
        file: 'divider-demo.html'
      },
      {
        name: 'Accordion',
        description: 'Perguntas e respostas colapsáveis, estilo shadcn com divider',
        category: 'navigation',
        file: 'accordion-demo.html'
      },
      {
        name: 'Stepper',
        description: 'Indicador de progresso por etapas com step atual destacado (sticky)',
        category: 'navigation',
        file: 'stepper-demo.html'
      },
      {
        name: 'Breadcrumb',
        description: 'Navegação hierárquica (caminho) com item atual e separadores',
        category: 'navigation',
        file: 'breadcrumb-demo.html'
      },
      {
        name: 'Menu',
        description: 'Navegação lateral colapsável com item ativo',
        category: 'navigation',
        file: 'menu-demo.html'
      },
      {
        name: 'Drawer',
        description: 'Painel lateral com overlay, fechamento por clique/esc e conteúdo composto',
        category: 'navigation',
        file: 'drawer-demo.html'
      },
      {
        name: 'Modal',
        description: 'Diálogo centralizado para confirmação de ações (overlay + esc)',
        category: 'navigation',
        file: 'modal-demo.html'
      },
      {
        name: 'Tab',
        description: 'Navegação entre seções com variantes linha e pílula, suporte a ícones e badges',
        category: 'navigation',
        file: 'tab-demo.html'
      },
      {
        name: 'Card',
        description: 'Superfícies compostas: formulário, evento, imagem e banners com tokens do DS',
        category: 'foundation',
        file: 'card-demo.html'
      },
      {
        name: 'Form components',
        description: 'Demonstração agrupada de campos de formulário no padrão do DS',
        category: 'form',
        file: 'form-components-demo.html'
      },
      {
        name: 'Input + Select',
        description: 'Campo de texto combinado com seletor no mesmo bloco',
        category: 'form',
        file: 'input-select-demo.html'
      },
      {
        name: 'Tabela — scroll virtual',
        description: 'Tabela com virtualização para listas grandes',
        category: 'data',
        file: 'table-virtual-scroll-demo.html'
      },
      {
        name: 'Componentes finais',
        description: 'Composições React/HTML alinhadas ao DS (showcase)',
        category: 'foundation',
        file: 'final-components-demo.html'
      }
    ];

    (function reorderCatalog() {
      const i = components.findIndex(c => c.file === 'design-tokens.html');
      if (i === -1) return;
      const dt = components.splice(i, 1)[0];
      components.sort((a, b) => a.name.localeCompare(b.name, 'pt-BR', { sensitivity: 'base' }));
      components.unshift(dt);
    })();

    const CATEGORY_LABELS = {
      foundation: 'Fundação',
      form: 'Formulário',
      data: 'Dados',
      feedback: 'Feedback',
      navigation: 'Navegação',
    };

    // Referências
    const grid = document.getElementById('components-grid');
    const searchInput = document.getElementById('search-input');
    const filterButtons = document.querySelectorAll('.filter-btn');
    const emptyState = document.getElementById('empty-state');

    }

    // Renderizar componentes
    function renderComponents() {
      const filtered = components.filter(comp => {
        const matchesCategory = currentFilter === 'all' || comp.category === currentFilter;
        const matchesSearch = comp.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                             comp.description.toLowerCase().includes(searchTerm.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      if (filtered.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      emptyState.style.display = 'none';

      grid.innerHTML = filtered.map(comp => `
        <a href="${comp.file}" class="component-card${comp.file === 'design-tokens.html' ? ' component-card--tokens' : ''}">
          <div class="component-preview">
            ${getPreviewMarkup(comp.name)}
          </div>
          <div class="component-info">
            <div class="component-name">${comp.name}</div>
            <div class="component-description">${comp.description}</div>
            <div class="component-meta">
              <span class="component-tag">${CATEGORY_LABELS[comp.category] || comp.category}</span>
            </div>
          </div>
        </a>
      `).join('');
    }

    // Event listeners
    searchInput.addEventListener('input', (e) => {
      searchTerm = e.target.value;
      renderComponents();
    });

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderComponents();
      });
    });

    // Inicializar
    totalCounter.textContent = components.length;
    renderComponents();

  </script>
</body>
</html>
